<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Meteorology</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>⚡ Smart Meteorology 🌪️</h1>
            <p class="subtitle">The intelligent weather checker</p>
        </header>
        
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Digite uma cidade ou clima (ex: tornado)...">
            <button id="search-btn">Buscar</button>
        </div>
        
        <div id="weather-card" class="card bom">
            <div id="weather-icon" class="icon">☀️</div>
            <h2 id="weather-status">O clima está ótimo!</h2>
            <p id="weather-desc">Aproveite para sair e caminhar.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
